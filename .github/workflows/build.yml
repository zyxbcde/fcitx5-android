name: Build APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y extra-cmake-modules gettext

      - name: Build APKs
        run: |
          ./gradlew :app:assembleDebug :app:assembleRelease --no-daemon --stacktrace

      - name: Find and list APK files
        run: |
          echo "=== 搜索所有 APK 文件 ==="
          find . -name "*.apk" -type f | grep -v ".gradle" | sort
          
          echo "=== app 模块构建输出 ==="
          ls -la app/build/outputs/ || echo "app/build/outputs 不存在"
          
          echo "=== 如果有的话，查看 apk 目录 ==="
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "apk 目录不存在"
          
          echo "=== 查看完整的 app/build 目录 ==="
          ls -la app/build/ || echo "app/build 目录不存在"

      - name: Upload any found APKs
        uses: actions/upload-artifact@v4
        with:
          name: found-apk-files
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
