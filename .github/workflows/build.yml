name: Build and Sign APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        abi: [arm64-v8a]
        build_type: [Release]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build signed APK
        run: |
          ./gradlew :app:assemble${{ matrix.build_type }} \
            -Pandroid.injected.build.abi=${{ matrix.abi }} \
            --no-daemon \
            --stacktrace

      - name: Find APK files
        run: |
          echo "=== 查找已签名的 APK 文件 ==="
          find . -name "*.apk" -exec echo "找到: {}" \;
          find ./app/build -name "*.apk" | head -10

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk-${{ matrix.abi }}-${{ matrix.build_type }}
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/bundle/**/*.aab
          retention-days: 30

      - name: Upload entire project as backup
        uses: actions/upload-artifact@v4
        if: always()  # 总是上传，确保有完整文件
        with:
          name: full-project-backup-${{ matrix.abi }}-${{ matrix.build_type }}
          path: .
          retention-days: 30
