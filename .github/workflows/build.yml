name: Build APK

on:
  push:
    branches: [master, main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'build-logic/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        abi: [arm64-v8a]
        build_type: [Release]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y extra-cmake-modules gettext

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build APK
        run: |
          echo "Building ${{ matrix.build_type }} APK for ABI: ${{ matrix.abi }}"
          
          # 构建特定 ABI 的 APK
          ./gradlew :app:assemble${{ matrix.build_type }} \
            -Pandroid.injected.build.abi=${{ matrix.abi }} \
            --no-daemon \
            --stacktrace
          echo "see"
          ls
          cd app 
          ls
          cd ..
          cd bulid
          ls
          cd outputs
          ls
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.abi }}-${{ matrix.build_type }}
          path: |
            build/outputs/apk/${{ matrix.build_type }}/app-${{ matrix.build_type }}-${{ matrix.abi }}.apk
            build/outputs/bundle/${{ matrix.build_type }}/app-${{ matrix.build_type }}-${{ matrix.abi }}.aab
          retention-days: 30
